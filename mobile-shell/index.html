<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <title>배당 투자</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
            display: grid;
            place-items: center;
            background: #050505;
            color: #f5f5f5;
            font-family: system-ui, sans-serif;
        }
        main { width: min(100%, 420px); text-align: center; }
        .icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 24px;
            display: grid;
            place-items: center;
            border-radius: 20px;
            background: #06dce8;
            color: #050505;
            font-size: 32px;
            font-weight: 900;
        }
        h1 { margin: 0; font-size: 24px; }
        p { margin: 16px 0 0; color: #9ca3af; line-height: 1.7; font-size: 14px; }
        code { color: #06dce8; }
    </style>
</head>
<body>
    <main>
        <div class="icon">₩</div>
        <h1>배당 투자</h1>
        <p>
            앱 서버 주소가 아직 설정되지 않았습니다.<br>
            패키징 전에 <code>CAPACITOR_SERVER_URL</code>을 HTTPS 배포 주소로 설정하고
            <code>npm run cap:sync</code>를 실행해 주세요.
        </p>
    </main>
</body>
</html>
