name: KR Market Data Update

on:
  schedule:
    # 1. 08:30 KST (23:30 UTC - previous day) - Morning Briefing
    - cron: '30 23 * * 0-4'
    # 2. 12:30 KST (03:30 UTC) - Intraday Check
    - cron: '30 3 * * 1-5'
    # 3. 16:30 KST (07:30 UTC) - Market Close
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # Manual trigger

jobs:
  update-kr-market:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_local.txt

      - name: Run KR Market Analysis
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Use the orchestrator script to update both data and AI report
          python KR_Market_Analyst/update_kr.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "1729021@naver.com"
          git config --local user.name "daniel"
          
          echo "=== Verifying KR Files ==="
          ls -l KR_Market_Analyst/kr_market/report_kr.html || echo "File not found"
          
          # Add the generated KR data and report files
          git add -f KR_Market_Analyst/kr_market/kr_daily_data.json
          git add -f KR_Market_Analyst/kr_market/report_kr.html
          
          # Force a commit even if git thinks nothing changed
          if git diff --cached --quiet; then
            echo "No changes detected. Forcing update..."
            date > last_run_kr.txt
            git add last_run_kr.txt
            git commit -m "auto: Manual forced KR update $(date +'%Y-%m-%d %H:%M')"
          else
            git commit -m "auto: KR market data & report update $(date +'%Y-%m-%d %H:%M')"
          fi
          
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force || echo "Push failed"

      - name: Deploy to MAIN Domain Repository (GitHub Pages)
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # 1. Clone the target repository
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/daniel17290221/daniel17290221.github.io.git main_repo
          
          # 2. Add/Verify ads.txt
          if [ -f "ads.txt" ]; then
            cp ads.txt main_repo/ads.txt
          fi
          
          # 3. Copy reports
          find us_market -name "report_us.html" -exec cp {} main_repo/report_us.html \;
          find KR_Market_Analyst -name "report_kr.html" -exec cp {} main_repo/report_kr.html \;
          
          # 4. Commit and Push
          cd main_repo
          git config user.email "1729021@naver.com"
          git config user.name "daniel"
          git add .
          if git commit -m "auto: Update KR AI Report from workflow"; then
            git push origin main --force
          else
            echo "No changes for main repo"
          fi

      # Vercel 복원: 코드 변경이 없으므로 Vercel 재배포 불필요
      # KR 데이터(JSON)은 Vercel에 배포되지 않음 (.vercelignore)
      # 리포트는 GitHub Pages(daniel17290221.github.io)로 직접 배포됨 (위 단계에서 완료)
