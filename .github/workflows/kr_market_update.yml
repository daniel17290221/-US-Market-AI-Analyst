name: KR Market Data Update

on:
  schedule:
    # 1. 08:30 KST (23:30 UTC - previous day) - Morning Briefing
    - cron: '30 23 * * 0-4'
    # 2. 12:30 KST (03:30 UTC) - Intraday Check
    - cron: '30 3 * * 1-5'
    # 3. 16:30 KST (07:30 UTC) - Market Close
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # Manual trigger

jobs:
  update-kr-market:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_local.txt

      - name: Run KR Market Analysis
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Use the orchestrator script to update both data and AI report
          python KR_Market_Analyst/update_kr.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add the generated KR data and report files using -f to bypass .gitignore
          git add -f KR_Market_Analyst/kr_market/kr_daily_data.json
          git add -f KR_Market_Analyst/kr_market/kr_market_daily_report.html
          
          # Commit only if there are changes
          if git commit -m "auto: KR market data & report update $(date +'%Y-%m-%d %H:%M')"; then
            echo "Successfully committed changes. Syncing branches via force push..."
            
            # Use force push on main to ensure auto-generated data files are always updated
            # without merge/rebase conflicts.
            git push origin main --force
            echo "Forced pushed changes to main."
          else
            echo "No changes to commit."
          fi

      - name: Deploy to MAIN Domain Repository (GitHub Pages)
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # 1. Clone the target repository
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/daniel17290221/daniel17290221.github.io.git main_repo
          
          # 2. Add/Verify ads.txt
          if [ -f "ads.txt" ]; then
            cp ads.txt main_repo/ads.txt
          fi
          
          # 3. Copy reports
          find us_market -name "us_market_morning_report.html" -exec cp {} main_repo/report_us.html \;
          find KR_Market_Analyst -name "kr_market_daily_report.html" -exec cp {} main_repo/report_kr.html \;
          
          # 4. Commit and Push
          cd main_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          if git commit -m "auto: Update KR AI Report from workflow"; then
            git push origin main --force
          else
            echo "No changes for main repo"
          fi

      - name: Trigger Vercel Deployment
        run: |
          curl -v -X POST "https://api.vercel.com/v1/integrations/deploy/prj_hYHnViRFvIuQoGJqQ7pgRUXWv78P/1sZQeXELu7"
