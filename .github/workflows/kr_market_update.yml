name: KR Market Data Update

on:
  schedule:
    # 1. 08:30 KST (23:30 UTC - previous day) - Morning Briefing
    - cron: '30 23 * * 0-4'
    # 2. 12:30 KST (03:30 UTC) - Intraday Check
    - cron: '30 3 * * 1-5'
    # 3. 16:30 KST (07:30 UTC) - Market Close
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # Manual trigger

jobs:
  update-kr-market:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_local.txt

      - name: Run KR Market Analysis
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Verify API key is available
          if [ -z "$KIE_API_KEY" ] && [ -z "$GOOGLE_API_KEY" ]; then
            echo "❌ [CRITICAL] KIE_API_KEY or GOOGLE_API_KEY secret must be set! KR Report will not run."
            exit 1
          fi
          if [ -n "$KIE_API_KEY" ]; then
            echo "✅ KIE_API_KEY is set (length: ${#KIE_API_KEY} chars)"
          else
            echo "✅ GOOGLE_API_KEY fallback is set (length: ${#GOOGLE_API_KEY} chars)"
          fi
          # Use the orchestrator script to update both data and AI report
          python KR_Market_Analyst/update_kr.py 2>&1
          
          echo "=== [VERIFY] Checking KR report ==="
          KR_SIZE=$(wc -c < KR_Market_Analyst/kr_market/report_kr.html 2>/dev/null || echo 0)
          echo "KR report size: $KR_SIZE bytes"
          if [ "$KR_SIZE" -lt 5000 ]; then
            echo "❌ [WARNING] KR report too small ($KR_SIZE bytes) - may be error page!"
          else
            echo "✅ KR report size OK"
          fi

      - name: Commit and Push changes
        run: |
          git config --local user.email "1729021@naver.com"
          git config --local user.name "daniel"
          
          echo "=== Verifying KR Files ==="
          ls -l KR_Market_Analyst/kr_market/report_kr.html || echo "File not found"
          
          # Add the generated KR data and report files
          git add -f KR_Market_Analyst/kr_market/kr_daily_data.json
          git add -f KR_Market_Analyst/kr_market/report_kr.html
          
          # Force a commit even if git thinks nothing changed
          if git diff --cached --quiet; then
            echo "No changes detected. Forcing update..."
            date > last_run_kr.txt
            git add last_run_kr.txt
            git commit -m "auto: Manual forced KR update $(date +'%Y-%m-%d %H:%M')"
          else
            git commit -m "auto: KR market data & report update $(date +'%Y-%m-%d %H:%M')"
          fi
          
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force || echo "Push failed"

      - name: Deploy to MAIN Domain Repository (GitHub Pages)
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # 1. Clone the target repository (clean)
          rm -rf main_repo
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/daniel17290221/daniel17290221.github.io.git main_repo
          
          # 2. Copy ONLY KR report (US report is handled by its own workflow)
          cp -f KR_Market_Analyst/kr_market/report_kr.html main_repo/report_kr.html
          
          # 3. Commit and Push
          cd main_repo
          git config user.email "1729021@naver.com"
          git config user.name "daniel"
          git add report_kr.html
          if git commit -m "auto: KR report update $(date +'%Y-%m-%d %H:%M')"; then
            git push origin main --force
            echo "✅ GitHub Pages updated with new KR report!"
          else
            echo "No changes to deploy"
          fi

      # Vercel 복원: 코드 변경이 없으므로 Vercel 재배포 불필요
      # KR 데이터(JSON)은 Vercel에 배포되지 않음 (.vercelignore)
      # 리포트는 GitHub Pages(daniel17290221.github.io)로 직접 배포됨 (위 단계에서 완료)
