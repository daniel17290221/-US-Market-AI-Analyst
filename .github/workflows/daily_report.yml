name: Daily US Market Report Update

on:
  schedule:
    # 매일 한국 시간 오전 7시 30분 (UTC 22:30)
    - cron: '30 22 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_local.txt

      - name: Run Market Update
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python us_market/update_all.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Only add files that the AI generated
          git add us_market/*.json us_market/*.csv us_market/*.html KR_Market_Analyst/kr_market/*.json KR_Market_Analyst/kr_market/*.html
          
          # Commit only if there are changes
          if git commit -m "auto: Daily market report update $(date +'%Y-%m-%d %H:%M')"; then
            echo "Pushing changes to origin master..."
            git push origin master
            
            # 🔥 Trigger Vercel Deployment explicitly after push
            curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_hYHnViRFvIuQoGJqQ7pgRUXWv78P/1sZQeXELu7"
          else
          fi
