name: Daily US Market Report Update

on:
  schedule:
    # 매일 한국 시간 오전 7시 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_local.txt

      - name: Run Market Update
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python us_market/update_all.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add us_market/*.json us_market/*.csv us_market/*.html
          if git commit -m "auto: daily market report update $(date +'%Y-%m-%d')"; then
            # Latest changes from remote (like Branding updates) are pulled first
            git pull --rebase origin master
            git push origin master
          else
            echo "No changes to commit"
          fi
