name: Daily US Market Report Update

on:
  schedule:
    # 1회/일: 07:30 KST (22:30 UTC 전날) - 장 시작 전 아침 브리핑
    - cron: '30 22 * * 0-4'
  workflow_dispatch:  # 수동 실행만 허용 (push 트리거 제거 - 무한루프 방지)

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_local.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_local.txt

      - name: Run Market Update
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Timeout set to 10 mins to prevent infinite hanging
          timeout 600s python us_market/update_all.py || echo "Update timed out but continuing..."

      - name: Commit and Push changes to CURRENT repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Add all data files recursively to handle nested folders
          git add us_market/**.json us_market/**.csv us_market/**.html KR_Market_Analyst/**.json KR_Market_Analyst/**.html || git add .
          if git commit -m "auto: Daily market report update $(date +'%Y-%m-%d %H:%M')"; then
            # Using the token directly in the remote URL to bypass 128 / permission issues
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force
          else
            echo "No changes to commit"
          fi

      - name: Deploy to MAIN Domain Repository (GitHub Pages)
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # 1. Clone the target repository
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/daniel17290221/daniel17290221.github.io.git main_repo
          
          # 2. Add/Verify ads.txt
          if [ -f "ads.txt" ]; then
            cp ads.txt main_repo/ads.txt
          else
            echo "google.com, pub-4995156883730033, DIRECT, f08c47fec0942fa0" > main_repo/ads.txt
          fi
          
          # 3. Copy reports (Use explicit paths to avoid overwriting with old duplicates)
          cp us_market/us_market_morning_report.html main_repo/report_us.html
          cp KR_Market_Analyst/kr_market/kr_market_daily_report.html main_repo/report_kr.html
          
          # 4. Commit and Push
          cd main_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          if git commit -m "auto: Update AI Reports and ads.txt"; then
            git push origin main --force
          else
            echo "No changes for main repo"
          fi

      # Vercel 자동 배포: GitHub 연동으로 코드 변경 시에만 자동 트리거됨
      # 데이터(JSON) 업데이트는 Vercel 재배포 불필요 → curl 호출 제거
