name: Daily US Market Report Update

on:
  schedule:
    # 1회/일: 07:30 KST (22:30 UTC 전날) - 장 시작 전 아침 브리핑 (월~토 아침)
    - cron: '30 22 * * 0-5'
  workflow_dispatch:  # 수동 실행만 허용 (push 트리거 제거 - 무한루프 방지)

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_local.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_local.txt

      - name: Run Macro Analyzer (Fresh News - Always First)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          echo "🔍 Fetching today's market news and generating macro analysis..."
          timeout 90s python us_market/macro_analyzer.py || echo "⚠️ Macro analyzer timed out - will use previous data"
          echo "macro_analyzer done at $(date)"

      - name: Run Full Market Update Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Total timeout: 20 minutes for the rest of the pipeline
          timeout 1200s python us_market/update_all.py || echo "Update timed out but continuing..."

      - name: Ensure Fresh Report Is Generated
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # Always regenerate the report to ensure latest macro data is used
          echo "📝 Regenerating final report with today's data..."
          timeout 120s python us_market/daily_report_generator.py || echo "⚠️ Report generator failed"
          ls -la us_market/us_market_morning_report.html

      - name: Commit and Push changes to CURRENT repo
        run: |
          git config --local user.email "1729021@naver.com"
          git config --local user.name "daniel"
          # Debug: confirm files were generated
          echo "=== Checking generated files ==="
          ls -la us_market/*.html || echo "No HTML in us_market/"
          ls -la KR_Market_Analyst/kr_market/*.html || echo "No HTML in kr_market/"
          echo "================================"
          # Force-add report files (bypasses .gitignore for tracked files)
          git add -f us_market/us_market_morning_report.html || true
          git add -f KR_Market_Analyst/kr_market/kr_market_daily_report.html || true
          git add us_market/*.json us_market/smart_money_picks_v2.csv || true
          git add KR_Market_Analyst/kr_market/*.json || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: Daily market report update $(date +'%Y-%m-%d %H:%M')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force || echo "Push failed"
          fi

      - name: Deploy to MAIN Domain Repository (GitHub Pages)
        env:
          API_TOKEN_GITHUB: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          # 1. Clone the target repository cleanly
          rm -rf main_repo
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/daniel17290221/daniel17290221.github.io.git main_repo
          
          # 2. Sync files
          cp -f us_market/us_market_morning_report.html main_repo/report_us.html || true
          cp -f KR_Market_Analyst/kr_market/kr_market_daily_report.html main_repo/report_kr.html || true
          
          # 3. Commit and Push with Force
          cd main_repo
          git config user.email "1729021@naver.com"
          git config user.name "daniel"
          git add .
          if git commit -m "auto: Update AI Reports $(date +'%Y-%m-%d %H:%M')"; then
            git push origin main --force
            echo "✅ GitHub Pages updated!"
          else
            echo "No changes for domain repo"
          fi

      - name: Trigger Vercel Redeployment
        run: |
          # Update vercel-trigger.txt to force Vercel to redeploy
          cd $GITHUB_WORKSPACE
          git config --local user.email "1729021@naver.com"
          git config --local user.name "daniel"
          echo "Report updated: $(date +'%Y-%m-%d %H:%M:%S')" > vercel-trigger.txt
          git add vercel-trigger.txt
          git commit -m "trigger: Vercel redeploy for report $(date +'%Y-%m-%d')" || echo "Already committed"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force || echo "Push failed"
          echo "✅ Vercel redeployment triggered!"
