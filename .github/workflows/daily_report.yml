name: Daily US Market Report Update

on:
  schedule:
    # 07:30 KST (22:30 UTC 전날) - 장 시작 전 아침 브리핑 (월~토 아침)
    - cron: '30 22 * * 0-5'
  workflow_dispatch:  # 수동 실행 허용

jobs:
  update-us-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements_local.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_local.txt

      - name: Generate US Market Report (Fast Mode)
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          echo "🚀 Starting US Market Report generation (fast mode)..."
          if [ -z "$GOOGLE_API_KEY" ]; then
            echo "❌ [CRITICAL] GOOGLE_API_KEY is NOT set!"
            exit 1
          fi
          echo "✅ GOOGLE_API_KEY is set (length: ${#GOOGLE_API_KEY} chars)"
          cd $GITHUB_WORKSPACE

          # --fast: runs macro_analyzer.py + daily_report_generator.py only (~2 min)
          # Skips heavy S&P500 download, 13F analysis, etc.
          python us_market/update_all.py --fast 2>&1

          echo "=== [VERIFY] Checking US report ==="
          US_SIZE=$(wc -c < us_market/report_us.html 2>/dev/null || echo 0)
          echo "US report size: $US_SIZE bytes"
          if [ "$US_SIZE" -lt 5000 ]; then
            echo "❌ US report is too small - generation may have failed!"
            exit 1
          else
            echo "✅ US report generated successfully"
          fi

      - name: Commit and Push US report to source repo
        run: |
          git config --local user.email "1729021@naver.com"
          git config --local user.name "daniel"

          git add -f us_market/report_us.html || true
          git add -A us_market/*.json || true
          git add -A us_market/*.csv || true

          if git diff --cached --quiet; then
            echo "No changes detected. Forcing a refresh commit..."
            date > last_run_us.txt
            git add last_run_us.txt
            git commit -m "auto: US report refresh $(date +'%Y-%m-%d %H:%M')"
          else
            git commit -m "auto: US Daily report update $(date +'%Y-%m-%d %H:%M')"
          fi

          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force || echo "Push failed"

      - name: Deploy US report to GitHub Pages
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          rm -rf main_repo
          git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/daniel17290221/daniel17290221.github.io.git main_repo

          cp -f us_market/report_us.html main_repo/report_us.html

          cd main_repo
          git config user.email "1729021@naver.com"
          git config user.name "daniel"
          git add report_us.html
          if git commit -m "auto: US report update $(date +'%Y-%m-%d %H:%M')"; then
            git push origin main --force
            echo "✅ GitHub Pages updated with new US report!"
          else
            echo "No changes to deploy"
          fi

      - name: Trigger Vercel Redeployment
        run: |
          cd $GITHUB_WORKSPACE
          git config --local user.email "1729021@naver.com"
          git config --local user.name "daniel"
          echo "US Report updated: $(date +'%Y-%m-%d %H:%M:%S')" > vercel-trigger.txt
          git add vercel-trigger.txt
          git commit -m "trigger: Vercel redeploy $(date +'%Y-%m-%d')" || echo "Already committed"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main --force || echo "Push failed"
          echo "✅ Vercel redeployment triggered!"
