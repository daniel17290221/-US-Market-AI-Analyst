name: Omni Alpha X Auto-Broadcaster

on:
  schedule:
    # --- Korean Market Insights (4 times/day, 7 days) ---
    - cron: '30 0 * * *'  # 09:30 KST
    - cron: '30 4 * * *'  # 13:30 KST
    - cron: '30 7 * * *'  # 16:30 KST
    - cron: '0 13 * * *'  # 22:00 KST
    
    # --- English Promo (2 times/day) ---
    - cron: '0 10 * * *'    # 10:00 UTC
    - cron: '0 16 * * *'    # 16:00 UTC
  
  workflow_dispatch: # Allow manual trigger

jobs:
  broadcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          pip install requests tweepy python-dotenv
          
      - name: Determine Mode and Post
        env:
          KIE_API_KEY: ${{ secrets.KIE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY != '' && secrets.X_API_KEY || secrets.TWITTER_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET != '' && secrets.X_API_SECRET || secrets.TWITTER_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN != '' && secrets.X_ACCESS_TOKEN || secrets.TWITTER_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET != '' && secrets.X_ACCESS_SECRET || secrets.TWITTER_ACCESS_SECRET }}
        run: |
          echo "X key lengths => API:${#X_API_KEY} SECRET:${#X_API_SECRET} ACCESS:${#X_ACCESS_TOKEN} ACCESS_SECRET:${#X_ACCESS_SECRET}"
          if [ -z "$X_API_KEY" ] || [ -z "$X_API_SECRET" ] || [ -z "$X_ACCESS_TOKEN" ] || [ -z "$X_ACCESS_SECRET" ]; then
            echo "❌ [CRITICAL] X API secrets are missing."
            echo "Required secret names: X_API_KEY/X_API_SECRET/X_ACCESS_TOKEN/X_ACCESS_SECRET"
            echo "or fallback names: TWITTER_API_KEY/TWITTER_API_SECRET/TWITTER_ACCESS_TOKEN/TWITTER_ACCESS_SECRET"
            exit 1
          fi
          if [ -z "$KIE_API_KEY" ] && [ -z "$GOOGLE_API_KEY" ]; then
            echo "❌ [CRITICAL] KIE_API_KEY or GOOGLE_API_KEY must be set for tweet generation."
            exit 1
          fi

          # Use current hour (UTC) to decide mode
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          
          echo "Current UTC Time: $HOUR:$MINUTE"
          
          if [[ "$HOUR" == "10" || "$HOUR" == "16" ]]; then
            echo "Mode: promo"
            python api/x_agent.py --mode promo
          elif [[ "$HOUR" == "00" || "$HOUR" == "04" || "$HOUR" == "07" || "$HOUR" == "13" ]]; then
            echo "Mode: kr_insight"
            python api/x_agent.py --mode kr_insight
          else
            # Default fallback for manual trigger or slight drift
            echo "Mode: standard (default)"
            python api/x_agent.py --mode standard
          fi

      - name: Commit and Push History
        run: |
          git config --local user.name "daniel"
          git config --local user.email "1729021@naver.com"
          git add logs/tweet_history.log || true
          git commit -m "chore: update tweet history log" || echo "No changes to commit"
          git push origin HEAD:main
